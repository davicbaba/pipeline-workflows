# Reusable workflow: bump the minor segment in <Version> of a .csproj, commit, and push.
# Does not build or pack; only edits the project file.
#
# Version rule: MAJOR.MINOR.PATCH → MAJOR.(MINOR+1).PATCH (patch unchanged).
# If <Version> is missing, starts from 1.0.0 → 1.1.0.
#
# Usage from a caller workflow:
#
#   permissions:
#     contents: write
#
#   jobs:
#     bump:
#       uses: davicbaba/pipeline-workflows/.github/workflows/bump-csproj-minor.yml@main
#       with:
#         project_path: src/MyApp/MyApp.csproj
#       secrets:
#         PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#
# Use a PAT with repo scope if GITHUB_TOKEN cannot push (e.g. workflow in fork).

name: Bump .csproj minor version

on:
  workflow_call:
    inputs:
      project_path:
        description: 'Path to the .csproj file relative to the repository root'
        required: true
        type: string

      commit_message:
        description: 'Commit message; {version} is replaced with the new version'
        required: false
        type: string
        default: 'chore: bump version to {version} [skip ci]'

    secrets:
      PUBLISH_TOKEN:
        description: 'Token with contents:write (checkout + push)'
        required: true

    outputs:
      version:
        description: 'The new version after the bump'
        value: ${{ jobs.bump.outputs.version }}
      commit_sha:
        description: 'Full commit SHA after push (for chained checkouts)'
        value: ${{ jobs.bump.outputs.commit_sha }}

jobs:
  bump:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.bump.outputs.version }}
      commit_sha: ${{ steps.pushed.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLISH_TOKEN }}

      - name: Bump minor version in .csproj
        id: bump
        run: |
          PROJECT_FILE="${{ inputs.project_path }}"

          if [ ! -f "$PROJECT_FILE" ]; then
            echo "Project file not found: $PROJECT_FILE"
            exit 1
          fi

          CURRENT=$(grep -oP '(?<=<Version>)[^<]+' "$PROJECT_FILE" || true)
          if [ -z "$CURRENT" ]; then
            CURRENT="1.0.0"
          fi

          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR="${PARTS[0]:-1}"
          MINOR="${PARTS[1]:-0}"
          PATCH="${PARTS[2]:-0}"

          MINOR=$((MINOR + 1))

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          if grep -q '<Version>' "$PROJECT_FILE"; then
            sed -i "s|<Version>[^<]*</Version>|<Version>${NEW_VERSION}</Version>|" "$PROJECT_FILE"
          else
            sed -i "s|</PropertyGroup>|  <Version>${NEW_VERSION}</Version>\n  </PropertyGroup>|1" "$PROJECT_FILE"
          fi

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${CURRENT} → ${NEW_VERSION}"

      - name: Commit and push
        env:
          MSG_TEMPLATE: ${{ inputs.commit_message }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          COMMIT_MSG="${MSG_TEMPLATE//\{version\}/${VERSION}}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.project_path }}"
          git commit -m "$COMMIT_MSG"
          git pull --rebase origin "${{ github.ref_name }}"
          git push

      - name: Record pushed commit SHA
        id: pushed
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

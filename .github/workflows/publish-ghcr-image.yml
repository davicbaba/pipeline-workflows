# Reusable workflow: build Docker image and push to GHCR.
# Restores NuGet against GitHub Packages (private feed) using a generated NuGet.config
# passed as a BuildKit secret (no token in image layers).
#
# Tags each push as: <git-sha-7> and latest (no .csproj version bump).
# Optional checkout_ref: exact commit/branch/ref to build (e.g. needs.bump.outputs.commit_sha).
#
# The Dockerfile must restore with:
#   RUN --mount=type=secret,id=nuget_auth,required=false \
#       bash -c '... dotnet restore --configfile /run/secrets/nuget_auth ...'
# See README in this repo for a full example.
#
# Usage from a caller workflow:
#
#   permissions:
#     contents: read   # required for actions/checkout
#     packages: write
#
#   jobs:
#     publish-image:
#       uses: davicbaba/pipeline-workflows/.github/workflows/publish-ghcr-image.yml@main
#       with:
#         dockerfile_path: Rental.Api/Dockerfile
#         context_path: .
#         image_name: rental-api
#         github_owner: davicbaba
#         # optional: prune_old_versions: true, keep_image_versions: 5, ghcr_package_name: ''
#       secrets:
#         PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#
# PUBLISH_TOKEN must allow: docker push to ghcr.io (packages:write) and read access to
# NuGet packages on nuget.pkg.github.com (same token is used as password).
# Pruning old versions uses the same token against the Packages API; it must be allowed
# to delete package versions (e.g. GITHUB_TOKEN with packages:write, or a PAT with
# delete:packages in addition to read:packages).

name: Publish Docker image to GHCR

on:
  workflow_call:
    inputs:
      dockerfile_path:
        description: 'Path to the Dockerfile (relative to repo root)'
        required: true
        type: string

      context_path:
        description: 'Docker build context path (relative to repo root)'
        required: false
        type: string
        default: '.'

      image_name:
        description: 'GHCR image name without registry (lowercase), e.g. rental-api → ghcr.io/<owner>/rental-api'
        required: true
        type: string

      github_owner:
        description: 'GitHub user or org that owns the private NuGet feed (nuget.pkg.github.com)'
        required: false
        type: string
        default: 'davicbaba'

      checkout_ref:
        description: 'Git ref or full SHA to checkout; empty = use the workflow trigger commit (github.sha)'
        required: false
        type: string
        default: ''

      prune_old_versions:
        description: 'After push, delete older GHCR package versions so only the last keep_image_versions remain'
        required: false
        type: boolean
        default: true

      keep_image_versions:
        description: 'How many newest image versions to keep in GHCR (by created_at); older versions are removed'
        required: false
        type: number
        default: 5

      ghcr_package_name:
        description: 'Optional GitHub Packages API name for the container (path after ghcr.io/owner/). Default: same as image_name; use for nested names (e.g. group/app). The API usually expects only the image segment, not owner/image.'
        required: false
        type: string
        default: ''

    secrets:
      PUBLISH_TOKEN:
        description: 'Token with packages:write and read access to GitHub Packages NuGet'
        required: true

    outputs:
      git_sha_short:
        description: 'First 7 characters of the commit SHA used as the immutable image tag'
        value: ${{ jobs.publish.outputs.git_sha_short }}

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      git_sha_short: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Normalise image name (lowercase)
        id: image
        run: |
          NAME=$(echo '${{ inputs.image_name }}' | tr '[:upper:]' '[:lower:]')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Git short SHA for image tag
        id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write NuGet config for Docker (GitHub Packages)
        env:
          NUGET_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          OWNER: ${{ inputs.github_owner }}
        run: |
          CONFIG="${RUNNER_TEMP}/nuget.ci.config"
          cat > "$CONFIG" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
              <add key="github-packages" value="https://nuget.pkg.github.com/${OWNER}/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <github-packages>
                <add key="Username" value="${OWNER}" />
                <add key="ClearTextPassword" value="${NUGET_TOKEN}" />
              </github-packages>
            </packageSourceCredentials>
          </configuration>
          EOF
          echo "NUGET_CI_CONFIG=${CONFIG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PUBLISH_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          REG="ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}"
          SHA="${{ steps.sha.outputs.short }}"
          TAGS="${REG}:${SHA}"$'\n'"${REG}:latest"
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          secret-files: |
            nuget_auth=${{ env.NUGET_CI_CONFIG }}

      - name: Prune old GHCR image versions
        if: ${{ inputs.prune_old_versions && inputs.keep_image_versions > 0 }}
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          IMAGE: ${{ steps.image.outputs.name }}
          KEEP: ${{ inputs.keep_image_versions }}
          GHCR_PACKAGE_NAME: ${{ inputs.ghcr_package_name }}
        run: |
          set -euo pipefail
          # GitHub REST API uses /orgs|users/{namespace}/packages/container/{package_name}/versions
          # where package_name is the image segment for ghcr.io/NAMESPACE/IMAGE (not namespace/image).
          # Fallback: some setups use owner%2Fimage as the package name — try both.
          if [ -n "${GHCR_PACKAGE_NAME}" ]; then
            CANDIDATES=("$(jq -rn --arg s "${GHCR_PACKAGE_NAME}" '$s|@uri')")
          else
            ENC_IMAGE=$(jq -rn --arg s "${IMAGE}" '$s|@uri')
            ENC_FULL=$(jq -rn --arg s "${OWNER}/${IMAGE}" '$s|@uri')
            CANDIDATES=("${ENC_IMAGE}" "${ENC_FULL}")
          fi

          LIST_BASE=""
          DELETE_KIND=""
          ENC_SELECTED=""

          for enc in "${CANDIDATES[@]}"; do
            for kind in org user; do
              if [ "$kind" = "org" ]; then
                url="https://api.github.com/orgs/${OWNER}/packages/container/${enc}/versions"
                dk="orgs"
              else
                url="https://api.github.com/users/${OWNER}/packages/container/${enc}/versions"
                dk="users"
              fi
              code=$(curl -sS -o /tmp/gh_pkg_probe.json -w "%{http_code}" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${url}?per_page=1")
              if [ "$code" = "200" ]; then
                LIST_BASE="${url}"
                DELETE_KIND="${dk}"
                ENC_SELECTED="${enc}"
                break 2
              fi
            done
          done

          if [ -z "${LIST_BASE}" ]; then
            echo "::warning::Could not list GHCR package versions (tried image-only and owner/image for org and user); skip pruning. Set input ghcr_package_name if your package name differs."
            exit 0
          fi

          page=1
          acc='[]'
          while true; do
            body=$(curl -sS \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${LIST_BASE}?per_page=100&page=${page}")
            n=$(echo "$body" | jq 'length')
            if [ "$n" -eq 0 ]; then
              break
            fi
            acc=$(jq -n --argjson a "$acc" --argjson b "$body" '$a + $b')
            if [ "$n" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done

          to_delete=$(echo "$acc" | jq -c --argjson k "$KEEP" \
            'sort_by(.created_at) | reverse | .[$k:] | map(.id)')

          n_del=$(echo "$to_delete" | jq 'length')
          if [ "$n_del" -eq 0 ]; then
            echo "Nothing to prune (total versions <= ${KEEP})."
            exit 0
          fi

          echo "Deleting ${n_del} older package version(s); keeping newest ${KEEP}."
          echo "$to_delete" | jq -r '.[]' | while read -r vid; do
            del_url="https://api.github.com/${DELETE_KIND}/${OWNER}/packages/container/${ENC_SELECTED}/versions/${vid}"
            dcode=$(curl -sS -o /tmp/gh_del.json -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$del_url")
            if [ "$dcode" != "204" ] && [ "$dcode" != "200" ]; then
              echo "::warning::DELETE version ${vid} returned HTTP ${dcode}"
              cat /tmp/gh_del.json >&2 || true
            fi
          done
